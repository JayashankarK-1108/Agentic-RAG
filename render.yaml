
services:
  - type: web
    name: agentic-rag-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:api --host 0.0.0.0 --port 10000
    envVars:
      - key: OPENAI_API_KEY
        scope: secret
      - key: PINECONE_API_KEY
        scope: secret
      - key: PINECONE_INDEX
        scope: secret
      - key: AWS_ACCESS_KEY_ID
        scope: secret
      - key: AWS_SECRET_ACCESS_KEY
        scope: secret
      - key: AWS_REGION
        value: us-east-1
      - key: S3_BUCKET_NAME
        scope: secret

  - type: static
    name: agentic-rag-frontend
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/build
    routes:
      - type: rewrite
        source: /
        destination: /index.html
      - type: rewrite
        source: /api/*
        destination: http://agentic-rag-backend:10000/$1
